<div class="workflow-container">
  <div class="panel">
    <div class="panel-header">
      <h4 class="panel-title">🎬 Video Configuration</h4>
    </div>
    <div class="panel-content">
      
      <!-- Master Video -->
      <div class="form-group">
        <label>Master Video File *</label>
        <div class="file-selector">
          <input type="text" [(ngModel)]="masterVideoPath" readonly placeholder="Click Browse to select" />
          <button type="button" class="btn btn-secondary" (click)="selectMasterVideo()">📁 Browse</button>
        </div>
        <small class="form-help">Main recording file</small>
      </div>

      <!-- Audio Sources -->
      <div class="form-group">
        <label>Audio Sources</label>
        <div class="project-audio-list">
          <p *ngIf="audioSources.length === 0" class="form-help">No audio sources. Click Add or Auto-detect below.</p>

          <div *ngFor="let source of audioSources" class="project-audio-item-compact">
            <span class="audio-filename">{{ source.name }}</span>
            <select class="audio-type-select-compact" [(ngModel)]="source.type" [name]="'type_' + source.id">
              <option value="">Select Type...</option>
              <option *ngFor="let type of getAvailableAudioTypes(source.type)" [value]="type">
                {{ audioSourceLabels[type] }}
              </option>
            </select>
            <button type="button" class="btn-remove-compact" (click)="removeAudioSource(source.id)" title="Remove">
              <span class="remove-icon">✕</span>
            </button>
          </div>
        </div>
        <div class="button-row mt-2">
          <button type="button" class="btn btn-secondary" (click)="addAudioSource()">➕ Add Audio</button>
          <button type="button" class="btn btn-secondary" (click)="autoDetectAudioFiles()" [disabled]="!masterVideoPath">🔍 Auto-detect</button>
        </div>
      </div>

      <!-- Master Projects -->
      <div class="form-group">
        <label>Master Projects</label>
        <div class="master-projects-container">
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="masterSolo" (ngModelChange)="onMasterSoloChange($event)" />
            <span class="checkbox-custom"></span>
            <span class="master-project-label">Master SOLO</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" [(ngModel)]="masterDc" (ngModelChange)="onMasterDcChange($event)" />
            <span class="checkbox-custom"></span>
            <span class="master-project-label">Master DC</span>
          </label>
        </div>
      </div>

      <!-- XML Options -->
      <div class="form-group">
        <div class="accordion-header" (click)="toggleXmlAccordion()">
          <label>Compound Clip Options</label>
          <span class="accordion-icon">{{ xmlAccordionOpen ? '▼' : '▶' }}</span>
        </div>
        <div class="accordion-content" [class.open]="xmlAccordionOpen">
          <div class="xml-options-actions mb-2">
            <button type="button" class="btn btn-small btn-secondary" (click)="selectAllXmlOptions()">All</button>
            <button type="button" class="btn btn-small btn-secondary" (click)="deselectAllXmlOptions()">None</button>
          </div>
          <div class="xml-options-container">
            <div *ngFor="let opt of xmlOptions" class="xml-option-item">
              <label class="checkbox-label">
                <input type="checkbox" [checked]="selectedXmlOptions.includes(opt.value)" (change)="toggleXmlOption(opt.value)" />
                <span class="checkbox-custom"></span>
                <div class="xml-option-info">
                  <span class="xml-option-name">{{ opt.label }}</span>
                  <span class="xml-option-desc">{{ opt.description }}</span>
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Progress Bar (always visible, disabled when not processing) -->
      <div class="form-group">
        <div class="inline-progress-container" [class.active]="isProcessing">
          <div class="inline-progress-message">{{ currentMessage || 'Ready to process' }}</div>
          <div class="inline-progress-bar-outer">
            <div class="inline-progress-bar-inner" [style.width.%]="currentProgress"></div>
          </div>
          <div class="inline-progress-percent">{{ currentProgress }}%</div>
        </div>
      </div>

      <!-- Process Button -->
      <div class="action-buttons-group">
        <button class="btn btn-primary" (click)="processWorkflow()" [disabled]="isProcessing || !masterVideoPath || audioSources.length === 0">
          🎬 Process
        </button>
        <button *ngIf="isProcessing" class="btn btn-danger" (click)="cancelJob()">⏹ Cancel</button>
      </div>

    </div>
  </div>
</div>
