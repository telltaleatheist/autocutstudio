<!-- App Layout with Top Header -->
<div class="app-layout">
  <!-- Content Area with Sidebar -->
  <div class="content-wrapper">
    <!-- Left Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">🎬</div>
          <div class="logo-text">
            <div class="logo-title">AutoCutStudio</div>
            <div class="logo-subtitle">Video Processor</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a routerLink="/workflow" routerLinkActive="active" class="sidebar-link">
          <div class="link-icon">🎬</div>
          <div class="link-text">Workflow</div>
        </a>
        <a routerLink="/audio-editor" routerLinkActive="active" class="sidebar-link">
          <div class="link-icon">🎵</div>
          <div class="link-text">Audio Editor</div>
        </a>
        <a routerLink="/audio-ducking" routerLinkActive="active" class="sidebar-link">
          <div class="link-icon">🔇</div>
          <div class="link-text">Audio Ducking</div>
        </a>
        <a routerLink="/relinking" routerLinkActive="active" class="sidebar-link">
          <div class="link-icon">🔗</div>
          <div class="link-text">Relinking</div>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle-btn" (click)="toggleTheme()" title="Toggle theme">
          <span class="toggle-icon">{{ currentTheme === 'dark' ? '☀️' : '🌙' }}</span>
          <span class="toggle-text">{{ currentTheme === 'dark' ? 'Light' : 'Dark' }} Mode</span>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
